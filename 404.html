<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Stackly</title>
  <link rel="stylesheet" href="css/styles.css?v=5">
  <link rel="stylesheet" href="css/404.css?v=6">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="page-loader"><div class="loader-pulse"></div></div>
  
  <!-- Particles Background -->
  <div id="particles-js" class="particles-bg"></div>

  <div class="error-page">
    <!-- Glassmorphic Card with Tilt -->
    <div class="glass-card error-card" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
      <div class="glitch-wrapper">
        <div class="glitch" data-text="404">404</div>
      </div>
      <!-- Typewriter Message -->
      <div class="typewriter">
        <h2 id="typewriter-text"></h2>
      </div>
      <div class="btn-group" style="justify-content: center; margin-top: 3rem;">
        <button onclick="history.back()" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Go Back</button>
        <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Page Loader
    window.addEventListener('load', () => {
      const loader = document.getElementById('page-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }
    });

    // Particles Config
    if(window.particlesJS) {
      particlesJS("particles-js", {
        "particles": {
          "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
          "color": { "value": ["#ffffff", "#ff0033", "#00ffff"] },
          "shape": { "type": "circle" },
          "opacity": { "value": 0.6, "random": true },
          "size": { "value": 3, "random": true },
          "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 },
          "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
        },
        "interactivity": {
          "detect_on": "canvas",
          "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
          "modes": { "repulse": { "distance": 100, "duration": 0.4 }, "push": { "particles_nb": 4 } }
        },
        "retina_detect": true
      });
    }

    // Typewriter Effect
    const text = "Oops... It seems you've wandered into the digital void.";
    let i = 0;
    const speed = 50; 
    function typeWriter() {
      if (i < text.length) {
        document.getElementById("typewriter-text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      } else {
        document.getElementById("typewriter-text").classList.add("done-typing");
      }
    }
    setTimeout(typeWriter, 800);
  </script>
</body>
</html>
