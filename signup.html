<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Stackly</title>
  <link rel="stylesheet" href="css/styles.css?v=5">
  <link rel="stylesheet" href="css/login.css?v=5">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <a href="index.html" class="floating-home-btn"><i class="fas fa-home"></i> Home</a>
  <div id="page-loader"><div class="loader-pulse"></div></div>
  <div class="login-container">
    <div class="animated-bg"></div>
    <div  data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2" class="login-card reveal active" style="max-width: 450px;">
      <a href="index.html" class="nav-brand"><img src="./assets/logo.webp" alt="Stackly Logo" style="height: 50px; margin-right: 50px; vertical-align: middle;"></a>
      <h2>Create an Account</h2>
      <form id="signup-form" action="login.html">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" required placeholder="Create a password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" required placeholder="Confirm your password">
        </div>
        <button type="submit" class="login-btn">Sign Up</button>
      </form>
      <a href="login.html" class="back-home">Already have an account? Login</a>
    </div>
  </div>
  <script src="js/main.js?v=5"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
</body>
</html>
